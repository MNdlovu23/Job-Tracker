<!DOCTYPE html>
<html>
    <head>
        <title>JobHunt</title>
        <style>
            body {
                background: #ffffff;
                font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                padding: 20px;
                max-width: 800px;
                margin: 0 auto;
            }
            h1 {
                color: #2d6a4f;
                font-size: 2rem;
                font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            }
            button {
                background: #2d6a4f;
                color: rgb(255, 255, 255);
                padding: 8px 16px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            input{
                padding: 8px 12px;
                border: 1px solid #ccc;
                border-radius: 4px;
                margin-right: 8px;
                font-size: 1rem;
            }
            li{
                background: #f5f5f5;
                color: #333;
                padding: 20px;
                margin: 8px;
                border-radius: 4px;
                list-style: none;
                display: flex;
                justify-content: space-between;
                align-items:border-left;

            }
        
            
            ul{
                padding: 0;
                margin-top: 20px;
            }
            select{
                background: #2d6a4f;
                color: rgb(254, 254, 254);
                padding: 8px 16px;
                border: none;
                border-radius: 4px;
                cursor: pointer;

            }
        </style>
    </head>
    <body>
        <h1>Job-Hunt</h1>
        <input id="company" placeholder="Company">
        <input id="role" placeholder="Role">
        <select id="status">
            <option>Applied</option>
            <option>Interview</option>
            <option>Offer</option>
            <option>Rejected</option>
        </select>
        <button id="addBtn">Add Job</button>
        <ul id="jobs"></ul>

         
    <script>
        async function loadJobs(){
            const res = await fetch("http://localhost:3000/jobs")
            const jobs = await res.json()
            const list = document.getElementById("jobs")
            list.innerHTML = ""
            jobs.forEach(job => {
                const li = document.createElement("li")
                li.className = job.status.toLowerCase()
                const dot = document.createElement("span")
                dot.textContent = " ● "
                const colours = {
                    applied: "#4a90d9",
                    interview: "#e8a838",
                    offer: "#2d6a4f",
                    rejected: "#d94a4a"
                }
                dot.style.color = colours[job.status.toLowerCase()]
                const text = document.createElement("span")
                text.textContent = job.company + " - " + job.role + " - " + job.status + " - " + job.date
                
                const btn = document.createElement("button")
                btn.textContent = "Delete"
                btn.addEventListener("click", ()=> deleteJob(job.id))
                const left = document.createElement("div")
                left.style.display = "flex"
                left.style.alignItems = "center"
                left.style.gap = "8px"
                left.appendChild(dot)
                left.appendChild(text)

                li.appendChild(left)
                li.appendChild(btn)
                list.appendChild(li)
            })
        }

        async function deleteJob(id) {
            await fetch("http://localhost:3000/jobs/" + id,{
                method: "DELETE"
            })
            loadJobs()
        }

        async function addJob() {
            const company = document.getElementById("company").value
            const role = document.getElementById("role").value
            const status = document.getElementById("status").value
            if (!company || !role){
                alert("Please fill in both Company and Role")
                return 
            }
            
            await fetch("http://localhost:3000/jobs",{
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({company, role, status})
            })

             document.getElementById("company").value = ""
             document.getElementById("role").value = ""
             document.getElementById("status").value = "Applied"
            loadJobs()



        }
        document.getElementById("addBtn").addEventListener("click", addJob)
        loadJobs()
    </script>
    </body>
    

</html>
