<!DOCTYPE html>
<html>
    <head>
        <title>Road2Hired</title>
        <style>
            body {
                background: #ffffff;
                font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                padding: 20px;
                max-width: 800px;
                margin: 0 auto;
            }
            h1 {
                color: #2d6a4f;
                font-size: 2rem;
                font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            }
            button {
                background: #2d6a4f;
                color: rgb(255, 255, 255);
                padding: 8px 16px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            input{
                padding: 8px 12px;
                border: 1px solid #ccc;
                border-radius: 4px;
                margin-right: 8px;
                font-size: 1rem;
            }
            li{
                background: #f5f5f5;
                color: #333;
                padding: 20px;
                margin: 8px;
                border-radius: 4px;
                list-style: none;
                display: flex;
                justify-content: space-between;
                align-items:center;

            }
        
            
            ul{
                padding: 0;
                margin-top: 20px;
            }
            select{
                background: #2d6a4f;
                color: rgb(254, 254, 254);
                padding: 8px 16px;
                border: none;
                border-radius: 4px;
                cursor: pointer;

            }
        </style>
    </head>
    <body>
        <h1>Road2Hired</h1>
        <input id="company" placeholder="Company">
        <input id="role" placeholder="Role">
        <select id="status">
            <option>Applied</option>
            <option>Interview</option>
            <option>Offer</option>
            <option>Rejected</option>
        </select>
        <button id="addBtn">Add Job</button>
        <div id="filters">
    <button onclick="filterJobs('All')">All</button>
    <button onclick="filterJobs('Applied')">Applied</button>
    <button onclick="filterJobs('Interview')">Interview</button>
    <button onclick="filterJobs('Offer')">Offer</button>
    <button onclick="filterJobs('Rejected')">Rejected</button>
</div>
        <ul id="jobs"></ul>

        <div id="modal" style ="display:none">
            <div id = "modal-box">
                <h2>Edit Job</h2>
                <input id="edit-company" placeholder="Company">
                  <input id="edit-role" placeholder="Role">
        <select id="edit-status">
            <option>Applied</option>
            <option>Interview</option>
            <option>Offer</option>
            <option>Rejected</option>
        </select>
        <button id="saveBtn">Save</button>
        <button id="cancelBtn">Cancel</button>
    

            </div>
        </div>

         
    <script>
        function renderJobs(jobs){
            const list = document.getElementById("jobs")
            list.innerHTML = ""
            jobs.forEach(job => {
                const li = document.createElement("li")
                li.className = job.status.toLowerCase()
                const dot = document.createElement("span")
                dot.textContent = " ● "
                const colours = {
                    applied: "#4a90d9",
                    interview: "#e8a838",
                    offer: "#2d6a4f",
                    rejected: "#d94a4a"
                }
                dot.style.color = colours[job.status.toLowerCase()]
                const text = document.createElement("span")
                text.textContent = job.company + " - " + job.role + " - " + job.status + " - " + job.date
                
                const btn = document.createElement("button")
                btn.textContent = "Delete"
                btn.addEventListener("click", ()=> deleteJob(job.id))
                const editBtn = document.createElement("button")
editBtn.textContent = "Edit"
editBtn.addEventListener("click", () => openEdit(job))

                
                const left = document.createElement("div")
                left.style.display = "flex"
                left.style.alignItems = "center"
                left.style.gap = "8px"
                left.appendChild(dot)
                left.appendChild(text)
                const buttons = document.createElement("div")
                buttons.style.display = "flex"
                buttons.style.gap = "8px"
                buttons.appendChild(editBtn)
                buttons.appendChild(btn)
                li.appendChild(left)
                li.appendChild(buttons)
                list.appendChild(li)
            })
        }

        async function loadJobs(){
          const res = await fetch("http://localhost:3000/jobs")
          const jobs = await res.json()
          renderJobs(jobs)
        }


        async function filterJobs(status) {
    const res = await fetch("http://localhost:3000/jobs")
    const jobs = await res.json()
    const filtered = status === "All" ? jobs : jobs.filter(job => job.status === status)
    renderJobs(filtered)
    }


        async function deleteJob(id) {
            await fetch("http://localhost:3000/jobs/" + id,{
                method: "DELETE"
            })
            loadJobs()
        }

        function openEdit(job){
            document.getElementById("modal").dataset.id = job.id
            document.getElementById("edit-company").value = job.company
            document.getElementById("edit-role").value = job.role
            document.getElementById("edit-status").value = job.status
            document.getElementById("modal").style.display = "block"
        }

        async function addJob() {
            const company = document.getElementById("company").value
            const role = document.getElementById("role").value
            const status = document.getElementById("status").value
            if (!company || !role){
                alert("Please fill in both Company and Role")
                return 
            }
            
            await fetch("http://localhost:3000/jobs",{
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({company, role, status})
            })

             document.getElementById("company").value = ""
             document.getElementById("role").value = ""
             document.getElementById("status").value = "Applied"
            loadJobs()



        }
        document.getElementById("addBtn").addEventListener("click", addJob)
        document.getElementById("cancelBtn").addEventListener("click", () => {
        document.getElementById("modal").style.display = "none"
})
document.getElementById("saveBtn").addEventListener("click", async () => {
    const id = document.getElementById("modal").dataset.id
    const company = document.getElementById("edit-company").value
    const role = document.getElementById("edit-role").value
    const status = document.getElementById("edit-status").value
    await fetch("http://localhost:3000/jobs/" + id, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({company, role, status})
    })
    document.getElementById("modal").style.display = "none"
    loadJobs()
})
        
        loadJobs()
    </script>
    </body>
    

</html>
